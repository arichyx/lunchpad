name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build draft release
    runs-on: macos-26
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH format." >&2
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit contained in main." >&2
            exit 1
          fi

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test --package-path "$GITHUB_WORKSPACE"

      - name: Build release artifacts
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}" ./Scripts/package-app.sh

      - name: Verify release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}" ./Scripts/verify-package.sh

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          assets=(
            "dist/Lunchpad-$version-macos-arm64.dmg"
            "dist/Lunchpad-$version-macos-arm64.zip"
            "dist/SHA256SUMS.txt"
          )

          if is_draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "$is_draft" != "true" ]]; then
              echo "Refusing to replace assets on a published release." >&2
              exit 1
            fi
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --draft \
              --generate-notes \
              --title "Lunchpad $version" \
              --verify-tag
          fi
